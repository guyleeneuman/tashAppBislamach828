</head>
<body>
    <img class="navbar" src="assets/logos/logos.png" alt="icon 1">

    <div  onclick="goToMenu()">
    <img class="moreWishes" src="assets/elements/moreWishes.png" alt="icon 1">

    <div class="subjects-container">
  <div class="subject" onclick="goToPage('menuBinleumi.html', 'bank1')">

  <div class="subject" onclick="chooseBank('bank2')">

</div>

    <img src="assets/buttons/moreBanks.png" alt="start button">
  </div>

<script src="main.js"></script>
<script src="mainB.js"></script>
</body>
<script>  
function goToBank2() {
    window.location.href = "bank2.html";
}

sessionStorage.setItem('lastPage', window.location.href);
function goToMenu() {
    window.location.href = "menu.html";
}
function goToInstructions() {

    let doors = document.querySelector(".doorContainer");
    doors.classList.add("open");

    document.body.classList.add("fade");

    setTimeout(()=>{
        window.location.href = "instructions.html";
    },1200);
}
</script>
