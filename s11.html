<script>

function goBack() {

}
document.addEventListener("DOMContentLoaded", () => {

const texts = [
"#אובדן או נזק ציוד אזרחי- עבור חיילים בשירות סדיר או מילואים: צהל אינו אחראי לציוד אישי אזרחי המוחזק על ידי החייל במחנה/מתקן/שטח צבאי. במקרה של אובדן/נזק לציוד אישי אזרחי עקב שירות צבאי יוכל חייל בשירות סדיר להגיש בקשה לקבלת פיצוי בגין הנזק/האובדן",
"שנגרם בעת שהותו בצבא ובתנאי שהציוד היה בשימושו האישי של החייל והוא לא התרשל בשמירתו. הוועדה אינה מחוייבת לפצות על כל ציוד שאבד/ניזוק.",
"אישורים נדרשים לבקשה: #טופס בקשה של החייל דרך משרד תש. על הטופס נדרשת חתימת סגן אלוף+ פירוט על האירוע #תחקיר מפורט וחתום על ידי קצין שנכח באירוע/במידה ולא נכח קצין יש לתחקר את הקצין המודע לאירוע בצורה הטובה ביותר.",
"המשך אישורים: #על התתחקיר להיות חתום על ידי מפקד בדרגת סגן אלוף #קבלות מקוריות/הצעות מחיר בעבור הנזק שנגרם."
];

const titleImages = [
    "assets/subsHova/s19.png",
    "assets/subsHova/s19.png",
    "assets/subsHova/s19.png",
    "assets/subsHova/s19.png",
    "assets/subsHova/moneyBenfit.png",
    "assets/subsHova/moneyBenfit.png",
    "assets/subsHova/moneyBenfit.png",
    "assets/subsHova/moneyBenfit.png",
    "assets/subsHova/moneyBenfit.png",
    "assets/subsHova/extraBenfit.png",
    "assets/subsHova/extraBenfit.png",





];

let currentIndex = 0;

const textElement = document.querySelector(".textS");
const titleElement = document.querySelector(".titleh");

// טעינה ראשונית
updateContent();

// ======================
// 📱 מובייל
// ======================
let startY = 0;
let endY = 0;

textElement.addEventListener("touchstart", (e) => {
    startY = e.touches[0].clientY;
});

textElement.addEventListener("touchend", (e) => {
    endY = e.changedTouches[0].clientY;
    handleSwipe();
});

// ======================
// 🖱️ דסקטופ
// ======================
textElement.addEventListener("click", (e) => {
    const rect = textElement.getBoundingClientRect();
    const clickY = e.clientY - rect.top;

    if (clickY < rect.height / 2) {
        goPrev();
    } else {
        goNext();
    }
});

// ======================
// 🔥 swipe
// ======================
function handleSwipe() {
    const diff = startY - endY;

    if (Math.abs(diff) < 50) return;

    if (diff > 0) {
        goPrev();
    } else {
        goNext();
    }
}

// ======================
// ➡️ קדימה
// ======================
function goNext() {
    currentIndex = Math.min(currentIndex + 1, texts.length - 1);
    updateContent();
}

// ======================
// ⬅️ אחורה
// ======================
function goPrev() {
    currentIndex = Math.max(currentIndex - 1, 0);
    updateContent();
}

// ======================
// 🔄 עדכון תוכן
// ======================
function updateContent() {
    textElement.style.opacity = 0;
    titleElement.style.opacity = 0;

    setTimeout(() => {
        textElement.innerText = texts[currentIndex];
        titleElement.src = titleImages[currentIndex];

        textElement.style.opacity = 1;
        titleElement.style.opacity = 1;
    }, 150);
}

});
</script>
