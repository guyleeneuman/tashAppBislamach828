<script>

}
document.addEventListener("DOMContentLoaded", () => {

const texts = [
"#תווי קניה-זכאות אוטומטית לתווי קנייה בחוגר בשווי 150 שח. עבור המתגוררים בידרת אלח הכזאות החודשית לרכישת מוצרי מזון היא 400 שח. #יום סידוירם- זכאי ליום סידורים של 24 שעות מלאות אחת לחודש בהכשרה ראשונית ואחת לחודשיים בשירותו הסדיר על חשבון המערכת.",
"#תווי חג- על סך 500 שח בראש השנה ובפסח. #מימון טיסה- חייל בודד מובהק זכאי למימון טיסה מלא על ידי הצבא לטובת מימוש מיוחדת לביקור קרוב משפחה מדרגה ראשונה בחול. ההטבה תינתן פעם בשירות ופעמיים עבור לוחמים (חייל בודד בן שליחים אינו זכאי למימון טיסה).",
"#הגעה מוקדמת הביתה- בימי שישי ישוחררו החיילים הבודדים באופן כזה שיגיעו לביתם עד השעה 10:00 לכל המאוחר בחגי פסח וראש השנה ישוחררו החיילים הבודדים יום לפני ערב החג עד השעה 17:30 לכל המאוחר.",
"#דמי כלכלה בעת חופשת מחלה- חייל בודד הנמצא בחופשת מחלה/חופשה מיוחדת כלכלית בביתו שאורכה מעל ל3 ימים זכאי לדמי כלכלה החל מהיום הראשון בו נמצא בבית (במידה ואינו מתגור בבית החייל) דובה דמי כלכלה ליום 52.35 שח."
];

const titleImages = [
    "assets/subsHova/extraBenfit.png",
    "assets/subsHova/extraBenfit.png",
    "assets/subsHova/extraBenfit.png",
     "assets/subsHova/extraBenfit.png",

];

let currentIndex = 0;

const textElement = document.querySelector(".textS");
const titleElement = document.querySelector(".titleh");

// טעינה ראשונית
updateContent();

// ======================
// 📱 מובייל
// ======================
let startY = 0;
let endY = 0;

textElement.addEventListener("touchstart", (e) => {
    startY = e.touches[0].clientY;
});

textElement.addEventListener("touchend", (e) => {
    endY = e.changedTouches[0].clientY;
    handleSwipe();
});

// ======================
// 🖱️ דסקטופ
// ======================
textElement.addEventListener("click", (e) => {
    const rect = textElement.getBoundingClientRect();
    const clickY = e.clientY - rect.top;

    if (clickY < rect.height / 2) {
        goPrev();
    } else {
        goNext();
    }
});

// ======================
// 🔥 swipe
// ======================
function handleSwipe() {
    const diff = startY - endY;

    if (Math.abs(diff) < 50) return;

    if (diff > 0) {
        goPrev();
    } else {
        goNext();
    }
}

// ======================
// ➡️ קדימה
// ======================
function goNext() {
    currentIndex = Math.min(currentIndex + 1, texts.length - 1);
    updateContent();
}

// ======================
// ⬅️ אחורה
// ======================
function goPrev() {
    currentIndex = Math.max(currentIndex - 1, 0);
    updateContent();
}

// ======================
// 🔄 עדכון תוכן
// ======================
function updateContent() {
    textElement.style.opacity = 0;
    titleElement.style.opacity = 0;

    setTimeout(() => {
        textElement.innerText = texts[currentIndex];
        titleElement.src = titleImages[currentIndex];

        textElement.style.opacity = 1;
        titleElement.style.opacity = 1;
    }, 150);
}

});
</script>
