<script>
function goToSub1() {
    window.location.href = "subject1.html";
}
function goToSub2() {
    window.location.href = "subject2.html";
}
function goToSub4() {
    window.location.href = "subject4.html";
}
function goToSub3() {
    window.location.href = "subject3.html";
}
function goToMenu() {
    window.location.href = "menu.html";
}

function goBack() {
    window.location.href = "s2P2.html";
}
document.addEventListener("DOMContentLoaded", () => {

const texts = [
"שמחה משפחתית: חייל זכאי לחופשה של עד 24 שעות על חשבון חופשה שנתית לטובת שמחהמשפחתית במידה ובעל השמחה הינו קרוב מדרגה ראשונה או אחיינו של החייל. אם אירוע השמחה מפוצל ל2 אירועים - יש לשחרר את החייל ל2 האירועים.",
"חופשה מיוחדת משפחתית: #הריון- 7 ימים #פוריות- לחייל 12 ימים ולחיילת 16 ימים #לידה/אימוץ- 8 ימים #נישואין- 10 ימים #אבל מדרגה ראשונה- 7 ימים #אבל מדרגה שנייה- 3 ימים.",
" #אזכרה שנתית לקרוב מדרגה ראשונה- 24 שעות #חופשה מיוחדת לקרוב מדרגה ראשונה בגין פציעה, מחלה, אשפוז- עד 58 ימים.",
"חופשה לביקור הורים בארץ לחייל הבודד: עד 4 ימי חופשה ביחידות ההכשרה הראשונית ו8 ימי חופשה ביחידות הסדיר.",
"מפקדו של החייל שהינו קצין/נגד/אזרח עובד צהל."
];

const titleImages = [
    "assets/subsHova/s26.png",
 "assets/subsHova/s26.png",
  "assets/subsHova/s26.png",
  "assets/subsHova/s26.png",
    "assets/subsHova/confirm.png",
];

let currentIndex = 0;

const textElement = document.querySelector(".textS");
const titleElement = document.querySelector(".titleh");

// טעינה ראשונית
updateContent();

// ======================
// 📱 מובייל
// ======================
let startY = 0;
let endY = 0;

textElement.addEventListener("touchstart", (e) => {
    startY = e.touches[0].clientY;
});

textElement.addEventListener("touchend", (e) => {
    endY = e.changedTouches[0].clientY;
    handleSwipe();
});

// ======================
// 🖱️ דסקטופ
// ======================
textElement.addEventListener("click", (e) => {
    const rect = textElement.getBoundingClientRect();
    const clickY = e.clientY - rect.top;

    if (clickY < rect.height / 2) {
        goPrev();
    } else {
        goNext();
    }
});

// ======================
// 🔥 swipe
// ======================
function handleSwipe() {
    const diff = startY - endY;

    if (Math.abs(diff) < 50) return;

    if (diff > 0) {
        goPrev();
    } else {
        goNext();
    }
}

// ======================
// ➡️ קדימה
// ======================
function goNext() {
    currentIndex = Math.min(currentIndex + 1, texts.length - 1);
    updateContent();
}

// ======================
// ⬅️ אחורה
// ======================
function goPrev() {
    currentIndex = Math.max(currentIndex - 1, 0);
    updateContent();
}

// ======================
// 🔄 עדכון תוכן
// ======================
function updateContent() {
    textElement.style.opacity = 0;
    titleElement.style.opacity = 0;

    setTimeout(() => {
        textElement.innerText = texts[currentIndex];
        titleElement.src = titleImages[currentIndex];

        textElement.style.opacity = 1;
        titleElement.style.opacity = 1;
    }, 150);
}

});
</script>
