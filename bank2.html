<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tashApp</title>
  <link rel="stylesheet" href="subject3.css">
</head>
<body>
    <img class="navbar" src="assets/logos/logos.png" alt="icon 1">
    <img class="title" src="assets/titles/sub3Title.png" alt="icon 1">
    <img class="instructions" src="assets/titles/sub3Instructions.png" alt="icon 1">

    <div class="subjects-container">
  <div class="subject" onclick="chooseBank('bank7')">
    <img src="assets/elements/bank7.png" alt="subject 1">
  </div>
  <div class="subject" onclick="chooseBank('bank8')">
    <img src="assets/elements/bank8.png" alt="subject 2">
  </div>
  <div class="subject" onclick="chooseBank('bank9')">
    <img src="assets/elements/bank9.png" alt="subject 3">
  </div>
  <div class="subject" onclick="chooseBank('bank10')">

  </div>
  <div class="subject" onclick="goToPage('menuBinleumi.html', 'bank1')">

  <div class="subject" onclick="chooseBank('bank12')">

  </div>
</div>

    <div class="button" onclick="goToBank3()">
    <img src="assets/buttons/moreBanks.png" alt="start button">
  </div>
      <div class="buttonBack" onclick="goBack3()">
    <img src="assets/buttons/backBtn.png" alt="start button">
  </div>

<script src="main.js"></script>
<script src="mainB.js"></script>
</body>
<script>  
function goToBank3() {
    window.location.href = "bank3.html";
}
function goBack3() {
    window.location.href = "sub3.html";
}
sessionStorage.setItem('lastPage', window.location.href);

function goToInstructions() {

    let doors = document.querySelector(".doorContainer");
    doors.classList.add("open");

    document.body.classList.add("fade");

    setTimeout(()=>{
        window.location.href = "instructions.html";
    },1200);
}
</script>
