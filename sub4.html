<script>
function goTo906() {
    window.location.href = "gdud906.html";
}
function goTo450() {
    window.location.href = "gdud450.html";
}
function goTomafhat() {
    window.location.href = "mafhat.html";
}
function goTo17() {
    window.location.href = "gdud17.html";
}
function goTomKtzinot() {
    window.location.href = "ktzinot.html";
}
function goToMenu() {
    window.location.href = "menu.html";
}
const overlay1 = document.querySelector('.cloud-overlay');

function transitionTo(url) {
    // מפעיל את האנימציה
    overlay1.classList.add('active');
    
    // אחרי זמן האנימציה, מעבר לעמוד הבא
    setTimeout(() => {
        window.location.href = url;
    }, 800); // זמן תואם ל-transition
}

// פונקציות עבור הכפתורים
function goToSub1() { transitionTo('sub1.html'); }
function goToSub2() { transitionTo('sub2.html'); }
function goToSub3() { transitionTo('sub3.html'); }
function goToSub4() { transitionTo('sub4.html'); }


const ginnie = document.querySelector('.ginnie');
const text = document.querySelector('.text');
const overlay = document.querySelector('.overlay');

ginnie.addEventListener('click', () => {
    ginnie.classList.toggle('active'); // מגדיל/מחזיר
    text.classList.toggle('active');   // מציג/מסתיר את הטקסט
    overlay.classList.toggle('active'); // מציג/מסתיר את המסך הכהה
});

// אופציונלי: לחיצה על ה-overlay סוגרת את הפופאפ
overlay.addEventListener('click', () => {
    ginnie.classList.remove('active');
    text.classList.remove('active');
    overlay.classList.remove('active');
});
</script>
