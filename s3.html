<script>
function goToSub1() {
    window.location.href = "subject1.html";
}
function goToSub2() {

function goToSub4() {

function goToMenu() {

function goBack() {
    window.location.href = "sub2.html";
}
document.addEventListener("DOMContentLoaded", () => {

const texts = [
    "היתר זה נועד לסייע לחייל ולמשפחתו השרוייה במצוקה כלכלית או סוציאלית קשה. במסגרת היתר זה יוכל החייל לקבל שכר תמורת עבודתו.",
    "אישורים נדרשים: #הצהרה לפתיחת בקשה #ריכוז יתרות-של החייל והוריו #עובר ושב של שלושת החודשים האחרונים #פירוט כרטיס אשראי של החייל #אישורים על חובות/עיקולים במידה ויש- שך החייל והוריו #טופס נכונות להעסקת חייל מחוץ לשעות העבודה בצהל #טופס החתמת מפקדים.",
    "מי אחראי לאשר לי את הבקשה: לאחר שכל הטפסים הוגשו למשרד התש, משק התש יחתים מפקד בדרגת רב סרן ומעלה. על המפקד למלא את החלטתו עד 7 ימים ממועד הגשת הבקשה על ידי החייל.",
    "#עובדי משמרות כגון טבחים #זכאי תשמש / אח זכאי # חיילי בודדים #חייל הנמצא בתהליך שילוב על ידי מדור שילוב #חייל חובה מעל גיל 24 #עתודאים- עתודאי בשירות חובה מעל גיל 22 ",
    "#חיילים אשר משרתים ברמתפעילות א ומעלה # אוכלוסית משגיחי כשרות #אוכלוסית הבני ישיבות בתקופת השלת #נהגי סיור # תקופת החפשש",
    "נועד למקרים בהם ישנן הכנסות מעסק פרטי או החזקת עסק פרטי לדוגמא- שליח וולט/קבלת עסק פרטי בירושה.",
    "אישורים נדרשים: 1) הצהרה לפתיחת בקשת היתר עבודה פרטית 2) מכתב אישי 3)הצגת אישור רשמי המעיד על בעלות עסק פרטי עדכני 4)אישורים כלכליים מלאים של החייל והוריו (ריכוז יתרות, עובר ושב , פירוט כרטיסי אשראי) 5)טופס החתמת מפקדים",
    "תא חובה במופת"

];

const titleImages = [
    "assets/subsHova/s3.png",
    "assets/subsHova/s3.png",
    "assets/subsHova/s3.png",
    "assets/subsHova/ptor.png",
    "assets/subsHova/ptor.png",
     "assets/subsHova/s31.png",
     "assets/subsHova/s31.png",
    "assets/subsHova/confirm.png",
];

let currentIndex = 0;

const textElement = document.querySelector(".textS");
const titleElement = document.querySelector(".titleh");

// טעינה ראשונית
updateContent();

// ======================
// 📱 מובייל
// ======================
let startY = 0;
let endY = 0;

textElement.addEventListener("touchstart", (e) => {
    startY = e.touches[0].clientY;
});

textElement.addEventListener("touchend", (e) => {
    endY = e.changedTouches[0].clientY;
    handleSwipe();
});

// ======================
// 🖱️ דסקטופ
// ======================
textElement.addEventListener("click", (e) => {
    const rect = textElement.getBoundingClientRect();
    const clickY = e.clientY - rect.top;

    if (clickY < rect.height / 2) {
        goPrev();
    } else {
        goNext();
    }
});

// ======================
// 🔥 swipe
// ======================
function handleSwipe() {
    const diff = startY - endY;

    if (Math.abs(diff) < 50) return;

    if (diff > 0) {
        goPrev();
    } else {
        goNext();
    }
}

// ======================
// ➡️ קדימה
// ======================
function goNext() {
    currentIndex = Math.min(currentIndex + 1, texts.length - 1);
    updateContent();
}

// ======================
// ⬅️ אחורה
// ======================
function goPrev() {
    currentIndex = Math.max(currentIndex - 1, 0);
    updateContent();
}

// ======================
// 🔄 עדכון תוכן
// ======================
function updateContent() {
    textElement.style.opacity = 0;
    titleElement.style.opacity = 0;

    setTimeout(() => {
        textElement.innerText = texts[currentIndex];
        titleElement.src = titleImages[currentIndex];

        textElement.style.opacity = 1;
        titleElement.style.opacity = 1;
    }, 150);
}

});
</script>
