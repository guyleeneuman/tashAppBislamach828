<script>
function goToSub1() {

function goToSub2() {

function goToMenu() {
    window.location.href = "menu.html";
}

function goBack() {
    window.location.href = "s5P2.html";
}
document.addEventListener("DOMContentLoaded", () => {

const texts = [
"#אירוח על ידי משפחה מארחת- מרכז הבודדים מקשר בין משפחות המעוניינות לארח בחגים לבין חיילים בודדים המעוניינים להתארח. באפשרות החייל לבחור איזור מועדף בארץ, ואופי אירוח מותאם- חילוני/מסורתי/דתי.",
"#בתי מלון ברחבי הארץ- התאחדות בתי המלון בישראל תורמת לחיילים בודדים אירוח בבית מלון ברחבי הארץ. האירוח מתבצע על ידי חלוקת הקצאות ליחידות טרם ערב החג ומקנה לילה בבית מלון לערב החג לחייל. פתרון זה מותנה בתרומות המשתנות מדי חג.",
"#אירוח בבית החייל- רשאים לבחור בהשתתפות בארוחת חג בבית החייל  בחגים בין אם מתגוררים בבית החייל באופן קבוע ובין אם לא."
];

const titleImages = [
    "assets/subsHova/s114.png",
    "assets/subsHova/s114.png",
    "assets/subsHova/s114.png",


];

let currentIndex = 0;

const textElement = document.querySelector(".textS");
const titleElement = document.querySelector(".titleh");

// טעינה ראשונית
updateContent();

// ======================
// 📱 מובייל
// ======================
let startY = 0;
let endY = 0;

textElement.addEventListener("touchstart", (e) => {
    startY = e.touches[0].clientY;
});

textElement.addEventListener("touchend", (e) => {
    endY = e.changedTouches[0].clientY;
    handleSwipe();
});

// ======================
// 🖱️ דסקטופ
// ======================
textElement.addEventListener("click", (e) => {
    const rect = textElement.getBoundingClientRect();
    const clickY = e.clientY - rect.top;

    if (clickY < rect.height / 2) {
        goPrev();
    } else {
        goNext();
    }
});

// ======================
// 🔥 swipe
// ======================
function handleSwipe() {
    const diff = startY - endY;

    if (Math.abs(diff) < 50) return;

    if (diff > 0) {
        goPrev();
    } else {
        goNext();
    }
}

// ======================
// ➡️ קדימה
// ======================
function goNext() {
    currentIndex = Math.min(currentIndex + 1, texts.length - 1);
    updateContent();
}

// ======================
// ⬅️ אחורה
// ======================
function goPrev() {
    currentIndex = Math.max(currentIndex - 1, 0);
    updateContent();
}

// ======================
// 🔄 עדכון תוכן
// ======================
function updateContent() {
    textElement.style.opacity = 0;
    titleElement.style.opacity = 0;

    setTimeout(() => {
        textElement.innerText = texts[currentIndex];
        titleElement.src = titleImages[currentIndex];

        textElement.style.opacity = 1;
        titleElement.style.opacity = 1;
    }, 150);
}

});
</script>
