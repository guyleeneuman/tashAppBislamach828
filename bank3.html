<script>  
function goBack1() {
    window.location.href = "bank2.html";
}
sessionStorage.setItem('lastPage', window.location.href);

function goToInstructions() {

    let doors = document.querySelector(".doorContainer");
    doors.classList.add("open");

    document.body.classList.add("fade");

    setTimeout(()=>{
        window.location.href = "instructions.html";
    },1200);
}
</script> 

<style>
.subjects-container {
    position: absolute;
    top: 5%;
    left: 0%;
    width: 94vw;
    height: 90vh;
    display: grid;
    grid-template-columns: repeat(3, auto);  /* רוחב הכפתורים בלבד */
    row-gap: 0.5vw;                          /* מרווח קטן בין השורות */
    column-gap: 2vw;                         /* מרווח בין העמודות */
    padding: 0;
    justify-items: center;
    align-items: center;
    place-content: center;
}
