<script>
function goToSub1() {
    window.location.href = "subject1.html";
}
function goToSub2() {

}
function goToSub4() {

}
function goToSub3() {
    window.location.href = "subject3.html";
}
function goToMenu() {
    window.location.href = "menu.html";
}

function goBack() {
    window.location.href = "s5.html";
}
document.addEventListener("DOMContentLoaded", () => {

const texts = [
  "#השתתפות השכר דירה+ הוצאות אחזקת דירה- חייל בודד השוכר דירה באופן עצמאי יהיה זכאי להשתתפות בהחזרי שכר הדירה בגובה 1800 שח. ",
  "#לינה בבית החייל- לינה באחד מתשעת בתי החייל הפזורים ברחבי הארץ. הלינה כוללת מענה במזון, שירותי כביסה, משחקים בשעות הפנאי, ליווי אישי וחברתי, אירועים חברתיים בבית החייל.",
  "#אימוץ בקיבוץ- לינת יחיד בחדר בקיבוץ. מיועד עבור חיילים המשרתים ביחידות סגורו בלבד. הלינה כוללת מענה מלא במזון, שירותי כביסה וליווי על ידי משפחה מאמצת לאורך תקופת הלינה בהתאם לרצון החייל.",
  "#דירת בית חם- לינה באחת מהדירות של האגודה למען החייל הפרוסות ברחבי הארץ. הדירות מרוהטות באופן מלא ומאובזרות במוצרי חשמל. חייל הלן בפתרון דיור זה זכאי לתווי קנייה בשווי 400 שח לרכישת מוצרי מזון. לכל אורך תקופת המגוריפ ילווה החייל על ידי רכז מטעם האגודה למען החייל.",
  "#דירת בית חם ללוחמים בודדים- לינה באחת מהדירות מטעם  האגודה למען החייל לפי האמור לעיל, המאפשרת ללוחם לינה בחדר לבד. "
];

const titleImages = [
    "assets/subsHova/s112.png",
     "assets/subsHova/s112.png",
         "assets/subsHova/s112.png",
     "assets/subsHova/s112.png",
 
];

let currentIndex = 0;

const textElement = document.querySelector(".textS");
const titleElement = document.querySelector(".titleh");

// טעינה ראשונית
updateContent();

// ======================
// 📱 מובייל
// ======================
let startY = 0;
let endY = 0;

textElement.addEventListener("touchstart", (e) => {
    startY = e.touches[0].clientY;
});

textElement.addEventListener("touchend", (e) => {
    endY = e.changedTouches[0].clientY;
    handleSwipe();
});

// ======================
// 🖱️ דסקטופ
// ======================
textElement.addEventListener("click", (e) => {
    const rect = textElement.getBoundingClientRect();
    const clickY = e.clientY - rect.top;

    if (clickY < rect.height / 2) {
        goPrev();
    } else {
        goNext();
    }
});

// ======================
// 🔥 swipe
// ======================
function handleSwipe() {
    const diff = startY - endY;

    if (Math.abs(diff) < 50) return;

    if (diff > 0) {
        goPrev();
    } else {
        goNext();
    }
}

// ======================
// ➡️ קדימה
// ======================
function goNext() {
    currentIndex = Math.min(currentIndex + 1, texts.length - 1);
    updateContent();
}

// ======================
// ⬅️ אחורה
// ======================
function goPrev() {
    currentIndex = Math.max(currentIndex - 1, 0);
    updateContent();
}

// ======================
// 🔄 עדכון תוכן
// ======================
function updateContent() {
    textElement.style.opacity = 0;
    titleElement.style.opacity = 0;

    setTimeout(() => {
        textElement.innerText = texts[currentIndex];
        titleElement.src = titleImages[currentIndex];

        textElement.style.opacity = 1;
        titleElement.style.opacity = 1;
    }, 150);
}

});
</script>
